<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>또갈 맛집지도</title>
  <!-- OpenGraph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="또갈 맛집지도">
  <meta property="og:description" content="또 가고 싶은 맛집 모음 - 부산/대구/울산">
  <meta property="og:image" content="images/og_img.jpg">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="preconnect" href="https://ldb-phinf.pstatic.net">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-title">
        <h1 class="logo">🍽️ 또갈 맛집지도 🥢</h1>
      </div>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="16" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" id="searchInput" placeholder="맛집 이름이나 주소로 검색..." autocomplete="off">
        <button id="searchClear" class="search-clear" hidden>&times;</button>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="tabs-section">
    <div class="tabs-scroll-wrapper" id="tabsWrapper">
      <div class="tabs-row" id="regionTabs"></div>
      <div class="tabs-row sub-tabs" id="subTabs"></div>
      <button class="sub-tabs-toggle" id="subTabsToggle">더보기 ▾</button>
      <div class="tabs-row cat-tabs" id="catTabs">
        <button class="tab-cat active" data-cat="all">전체</button>
        <button class="tab-cat" data-cat="한식">🍚 한식</button>
        <button class="tab-cat" data-cat="일식">🍣 일식</button>
        <button class="tab-cat" data-cat="중식">🥟 중식</button>
        <button class="tab-cat" data-cat="양식">🍝 양식</button>
        <button class="tab-cat" data-cat="고기">🥩 고기</button>
        <button class="tab-cat" data-cat="해산물">🦐 해산물</button>
        <button class="tab-cat" data-cat="국물">🍜 국물</button>
        <button class="tab-cat" data-cat="술집">🍺 술집</button>
      </div>
    </div>
  </nav>

  <!-- Store Cards -->
  <main class="main-content">
    <section class="cards-section">
      <div class="cards-header">
        <h2 id="sectionTitle">맛집 모음</h2>
        <span id="storeCount" class="store-count"></span>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
      <div class="load-more-wrap" id="loadMoreWrap" hidden>
        <button id="loadMoreBtn" class="load-more-btn">더 보기</button>
      </div>
    </section>

    <!-- Map -->
    <section class="map-section">
      <h2 class="map-title">지도에서 보기</h2>
      <div id="map" class="map-container"></div>
    </section>

    <!-- Cross Link -->
    <section class="cross-link-section">
      <a class="cross-link-card" href="https://sooyeon-11.github.io/bread-coffee/">
        <span class="cross-link-emoji">🥐</span>
        <div class="cross-link-info">
          <span class="cross-link-title">빵굽는 지도, 커피 한 잔</span>
          <span class="cross-link-sub">카페 · 빵집이 궁금하다면? &rarr;</span>
        </div>
      </a>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-links">
      <a href="https://www.instagram.com/xujji_/" target="_blank" rel="noopener" class="footer-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/></svg>
        @xujji_
      </a>
      <a href="https://www.instagram.com/xuvea2/" target="_blank" rel="noopener" class="footer-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/></svg>
        @xuvea2
      </a>
      <a href="https://blog.naver.com/xuvea2" target="_blank" rel="noopener" class="footer-link">
        <svg width="14" height="14" viewBox="0 0 20 20"><path d="M13.5 10.6L6.3 2H2v16h4.5V9.4L13.7 18H18V2h-4.5v8.6z" fill="currentColor"/></svg>
        Blog
      </a>
    </div>
    <p>&copy; youn.so</p>
  </footer>

  <!-- Store Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-scroll">
        <div class="slider" id="modalSlider">
          <div class="slider-track" id="sliderTrack"></div>
          <button class="slider-arrow slider-prev" id="sliderPrev">&lsaquo;</button>
          <button class="slider-arrow slider-next" id="sliderNext">&rsaquo;</button>
          <div class="slider-dots" id="sliderDots"></div>
        </div>

        <div class="modal-tabs">
          <button class="modal-tab active" data-modal-tab="home">홈</button>
          <button class="modal-tab" data-modal-tab="menu">메뉴</button>
          <button class="modal-tab" data-modal-tab="review">리뷰</button>
          <button class="modal-tab" data-modal-tab="info">정보</button>
        </div>

        <div class="modal-tab-content active" id="tabHome">
          <div class="modal-body">
            <div class="modal-header">
              <h3 id="modalName"></h3>
              <span class="modal-badge" id="modalBadge"></span>
            </div>
            <p class="micro-review" id="modalMicroReview" hidden></p>
            <div class="modal-info">
              <p id="modalAddress"></p>
              <p id="modalPhone"></p>
              <p id="modalHours"></p>
              <p id="modalSubway" hidden></p>
            </div>
            <div class="modal-links" id="modalLinks"></div>
          </div>
        </div>

        <div class="modal-tab-content" id="tabMenu">
          <div class="modal-body">
            <div class="menu-list" id="menuList"></div>
          </div>
        </div>

        <div class="modal-tab-content" id="tabReview">
          <div class="modal-body">
            <div class="review-summary" id="reviewSummary"></div>
            <div class="visitor-reviews" id="visitorReviews"></div>
            <h4 class="review-section-title" id="blogReviewsTitle" hidden>블로그 리뷰</h4>
            <div class="blog-reviews" id="blogReviews"></div>
            <a class="modal-link-btn naver-btn review-more-link" id="reviewMoreLink" href="#" target="_blank" rel="noopener">
              리뷰 더보기 &rarr;
            </a>
          </div>
        </div>

        <div class="modal-tab-content" id="tabInfo">
          <div class="modal-body">
            <div class="info-section" id="infoConveniences" hidden>
              <h4 class="info-section-title">편의시설</h4>
              <div class="info-tags" id="conveniencesList"></div>
            </div>
            <div class="info-section" id="infoSeat" hidden>
              <h4 class="info-section-title">좌석</h4>
              <div class="info-tags" id="seatList"></div>
            </div>
            <div class="info-section" id="infoRoad" hidden>
              <h4 class="info-section-title">오시는 길</h4>
              <p class="info-road-text" id="roadGuideText"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Review Detail -->
  <div class="review-detail-overlay" id="reviewDetailOverlay" hidden>
    <div class="review-detail">
      <button class="review-detail-close" id="reviewDetailClose">&times;</button>
      <div class="review-detail-images" id="reviewDetailImages"></div>
      <div class="review-detail-body">
        <div class="review-detail-author" id="reviewDetailAuthor"></div>
        <div class="review-detail-text" id="reviewDetailText"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
