name: Sync Stores Data

on:
  # 매주 월요일 오전 6시 (한국시간) 자동 실행
  schedule:
    - cron: '0 21 * * 1'  # UTC 21:00 Mon = KST 06:00 Tue
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync store data
        run: node scripts/sync.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/stores.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stores.json
          git commit -m "chore: sync stores data ($(date +%Y-%m-%d))"
          git push
